name: Reusable Verification

on:
  workflow_call:
    inputs:
      working-directory:
        description: "The directory where the command should be run"
        required: false
        default: "."
        type: string
      sdk:
        description: 'Which SDK to use: "dart" or "flutter"'
        required: false
        default: "dart"
        type: string
      run-tests:
        description: "Whether to run tests"
        required: false
        default: true
        type: boolean
      analyze:
        description: "Whether to run analysis"
        required: false
        default: true
        type: boolean
      format:
        description: "Whether to check formatting"
        required: false
        default: true
        type: boolean

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Dart
        if: ${{ inputs.sdk == 'dart' }}
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Set up Flutter
        if: ${{ inputs.sdk == 'flutter' }}
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ secrets.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: ${{ inputs.sdk }} pub get
        working-directory: ${{ inputs.working-directory }}

      - name: Check formatting
        if: ${{ inputs.format }}
        run: dart format --set-exit-if-changed .
        working-directory: ${{ inputs.working-directory }}

      - name: Analyze code
        if: ${{ inputs.analyze }}
        run: dart analyze --fatal-infos .
        working-directory: ${{ inputs.working-directory }}

      - name: Run tests
        if: ${{ inputs.run-tests }}
        run: ${{ inputs.sdk }} test
        working-directory: ${{ inputs.working-directory }}
