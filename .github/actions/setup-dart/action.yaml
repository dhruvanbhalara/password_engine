name: Setup Dart Environment
description: |
  Composite action to setup Dart SDK and restore pub cache.

inputs:
  working-directory:
    description: "The directory where the pub get command should be run"
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Set up Dart
      uses: dart-lang/setup-dart@v1
      with:
        sdk: stable

    - name: Cache Pub dependencies
      uses: actions/cache@v4
      with:
        path: ~/.pub-cache
        key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-pub-

    - name: Get dependencies
      shell: bash
      run: dart pub get
      working-directory: ${{ inputs.working-directory }}
